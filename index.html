<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">tetris-cursor · Cursor Agent 데모</p>
    </header>

    <main class="game-layout">
      <aside class="panel panel-left">
        <section class="info-card">
          <h2>점수</h2>
          <p id="score" class="stat-value">0</p>
        </section>
        <section class="info-card">
          <h2>레벨</h2>
          <p id="level" class="stat-value">1</p>
        </section>
        <section class="info-card">
          <h2>줄</h2>
          <p id="lines" class="stat-value">0</p>
        </section>
      </aside>

      <section class="board-section">
        <canvas id="game-canvas" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-card">
            <h2 id="overlay-title">테트리스</h2>
            <p id="overlay-message">시작하려면 버튼을 누르세요</p>
            <button id="start-btn" type="button" class="btn btn-primary">게임 시작</button>
            <button id="restart-btn" type="button" class="btn btn-secondary hidden">다시 시작</button>
          </div>
        </div>
      </section>

      <aside class="panel panel-right">
        <section class="info-card">
          <h2>다음 블록</h2>
          <canvas id="next-canvas" width="120" height="120" aria-label="다음 블록 미리보기"></canvas>
        </section>
        <section class="info-card controls-info">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> <kbd>→</kbd> 이동</li>
            <li><kbd>↓</kbd> 소프트 드롭</li>
            <li><kbd>↑</kbd> 회전</li>
            <li><kbd>Space</kbd> 하드 드롭</li>
            <li><kbd>P</kbd> 일시정지</li>
          </ul>
        </section>
      </aside>
    </main>

    <nav class="touch-controls" aria-label="터치 조작">
      <button type="button" class="touch-btn" data-action="left">◀</button>
      <button type="button" class="touch-btn" data-action="rotate">↻</button>
      <button type="button" class="touch-btn" data-action="right">▶</button>
      <button type="button" class="touch-btn" data-action="down">▼</button>
      <button type="button" class="touch-btn touch-btn-wide" data-action="drop">⬇</button>
    </nav>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
