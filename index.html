<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">HTML · CSS · JavaScript 학습용 프로젝트</p>
    </header>

    <main class="game-layout">
      <section class="board-section">
        <div id="game-board" class="board" aria-label="테트리스 게임 보드"></div>
        <div id="overlay" class="overlay hidden" role="dialog" aria-live="polite">
          <div class="overlay-card">
            <h2 id="overlay-title">게임 오버</h2>
            <p id="overlay-message">최종 점수: 0</p>
            <p class="overlay-hint">다시 시작 버튼을 누르세요.</p>
          </div>
        </div>
      </section>

      <aside class="panel">
        <section class="info-card">
          <h2>점수</h2>
          <p id="score" class="stat-value">0</p>
        </section>

        <section class="info-card actions">
          <button id="start-btn" type="button" class="btn btn-primary">게임 시작</button>
          <button id="restart-btn" type="button" class="btn btn-secondary">다시 시작</button>
        </section>

        <section class="info-card controls-info">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> 왼쪽 이동</li>
            <li><kbd>→</kbd> 오른쪽 이동</li>
            <li><kbd>↓</kbd> 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> 블록 회전</li>
            <li><kbd>Space</kbd> 하드 드롭 (즉시 착지)</li>
          </ul>
          <p class="note">게임 시작 후 키보드로 조작할 수 있습니다.</p>
        </section>
      </aside>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
